<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>table and list</title>
</head>
<body>
    <link rel="stylesheet" href="style.css">
    <img width="230" height="230" src="https://images7.alphacoders.com/425/425727.jpg" alt="sci fi img"> <br>
    <table>
        <caption>student details</caption>
        
        <tr>
             <th>name</th>
             <th>age</th>
             <th>fav language</th>
            
        </tr>
        
        <tr>
             <td>emit</td>
             <td>25</td>
             <td>javascript</td>
            
        </tr>
        
        <tr>
            <td colspan="2" >sam</td>

        <td rowspan="2" >java</td>

        </tr>
    
    </table>

        <ul type="square" >
          <li>emit</li>
          <li>sham</li>
          <li>tom</li>
        </ul>
        <ol type="I" >
         <li>emit</li>
         <li>sham</li>
         <li>tom</li>
        </ol>

    
    <footer>
        emit right
    </footer>
    

</body>
</html>
